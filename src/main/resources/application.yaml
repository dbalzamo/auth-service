spring:
  application:
    name: iam-provider
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/robofleet_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: iam
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: db/migration

security:
  jwt:
    secret: ${JWT_SECRET:ZmxlZXQtcHVsc2UtbG9jYWwtand0LXNlY3JldC1rZXkhIQ==}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000

server:
  port: 8081
  servlet:
    context-path: /iam

app:
  version: 1.0.0